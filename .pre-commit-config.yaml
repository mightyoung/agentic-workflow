# Pre-commit hooks for agentic-workflow
# Install: pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast mode)
        entry: python -m pytest tests/ -q --tb=no
        language: system
        stages: [push]

      - id: no-debug
        name: no debug statements
        entry: bash -c 'grep -rEl "import pdb|import ipdb|breakpoint" scripts/ --include="*.py" || exit 0'
        language: system
        types: [python]
