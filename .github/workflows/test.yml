name: Test Skill

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check required files
        run: |
          echo "Checking SKILL.md exists..."
          test -f SKILL.md

          echo "Checking README.md exists..."
          test -f README.md

      - name: Check skill structure
        run: |
          echo "Checking core modules..."
          grep -q "THINKING" SKILL.md
          grep -q "PLANNING" SKILL.md
          grep -q "EXECUTING" SKILL.md
          grep -q "REVIEWING" SKILL.md
          grep -q "DEBUGGING" SKILL.md

      - name: Check PUA integration
        run: |
          echo "Checking PUA fusion..."
          grep -q "PUA" SKILL.md
          grep -q "铁律" SKILL.md

      - name: Check integrated skills references
        run: |
          echo "Checking sub-skills are referenced..."
          grep -q "best-minds" SKILL.md
          grep -q "planning-with-files" SKILL.md
          grep -q "TDD" SKILL.md

  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short
